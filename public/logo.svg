<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 190" width="100%" height="100%">
  <defs>
    <clipPath id="head-clip">
      <path d="M 105,15 
               C 70,15 45,35 40,65 
               C 38,72 30,82 10,95 
               C 30,100 38,103 36,110 
               C 34,115 28,120 30,125 
               C 28,130 23,135 25,142 
               C 30,150 43,148 53,155 
               C 63,162 73,175 88,175 
               L 160,175 
               L 160,15 
               Z" />
    </clipPath>
  </defs>

  <!-- Colored Stripes Group clipped to Head Profile -->
  <g clip-path="url(#head-clip)">
    <rect x="0" y="15" width="200" height="32" fill="#1d4ed8" /> <!-- Blue -->
    <rect x="0" y="47" width="200" height="32" fill="#facc15" /> <!-- Yellow -->
    <rect x="0" y="79" width="200" height="32" fill="#db2777" /> <!-- Magenta -->
    <rect x="0" y="111" width="200" height="32" fill="#06b6d4" /> <!-- Cyan -->
    <rect x="0" y="143" width="200" height="32" fill="#7c3aed" /> <!-- Purple -->
  </g>

  <!-- Circuit Lines -->
  <!-- Blue Line -->
  <path d="M 160,31 L 210,31 L 226,15 L 260,15" fill="none" stroke="#1d4ed8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="260" y="5" width="20" height="20" fill="#ffffff" stroke="#1d4ed8" stroke-width="6" rx="2" />

  <!-- Yellow Line -->
  <path d="M 160,63 L 200,63 L 215,55 L 240,55" fill="none" stroke="#facc15" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="240" y="45" width="20" height="20" fill="#ffffff" stroke="#facc15" stroke-width="6" rx="2" />

  <!-- Magenta Line -->
  <path d="M 160,95 L 185,95 L 200,110 L 220,110 L 235,125 L 310,125" fill="none" stroke="#db2777" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="310" y="115" width="20" height="20" fill="#ffffff" stroke="#db2777" stroke-width="6" rx="2" />

  <!-- Cyan Line -->
  <path d="M 160,127 L 180,127 L 205,152 L 255,152" fill="none" stroke="#06b6d4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="255" y="142" width="20" height="20" fill="#ffffff" stroke="#06b6d4" stroke-width="6" rx="2" />

  <!-- Vertical Magenta Separator Line -->
  <line x1="335" y1="10" x2="335" y2="180" stroke="#db2777" stroke-width="8" stroke-linecap="round" />

  <!-- Brand Typography -->
  <text x="365" y="85" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="78px" fill="#1d4ed8" letter-spacing="-1px">BAWRA</text>
  <text x="365" y="162" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="78px" fill="#1d4ed8" letter-spacing="-1px">DIGITALS</text>
</svg>
